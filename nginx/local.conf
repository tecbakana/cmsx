# ── Admin: localhost:4400 → cmsui + cmsapi ──────────────────────
server {
    listen 4400;

    # Rotas da API (espelho do ingress admin.multiplai.com.br)
    location ~ ^/(auth|usuarios|aplicacaos|dashboard|modulos|conteudos|areas|categorias|produtos|formularios|grupos|vinculos|vinculosmodulo|pagebuilder|wiki|faq|site|layouttemplates|pedidos|orcamentos|publictokens|media|swagger|health|api)(/.*)?$ {
        proxy_pass         http://cmsapi:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback → cmsui
    location / {
        proxy_pass         http://cmsui:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}

# ── Public: localhost:4401 → publicui + cmsapi-publica ──────────
server {
    listen 4401;

    # API pública
    location /api {
        proxy_pass         http://cmsapi-publica:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA fallback → publicui
    location / {
        proxy_pass         http://publicui:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
