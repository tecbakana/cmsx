<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Conteúdo</h4>
    <button class="btn btn-primary btn-sm" (click)="novo()" *ngIf="!modoEdicao">+ Novo</button>
  </div>

  <div *ngIf="modoEdicao" class="card mb-3">
    <div class="card-body">
      <h5>{{ selecionado?.conteudoid ? 'Editar' : 'Novo' }} Conteúdo</h5>
      <div class="row g-2 mb-2">
        <div class="col-md-6">
          <label class="form-label">Título</label>
          <input class="form-control" [(ngModel)]="selecionado.titulo">
        </div>
        <div class="col-md-3">
          <label class="form-label">Área</label>
          <select class="form-select" [(ngModel)]="selecionado.areaid">
            <option [value]="null">-- Nenhuma --</option>
            <option *ngFor="let a of areas" [value]="a.areaid">{{a.nome}}</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Categoria</label>
          <select class="form-select" [(ngModel)]="selecionado.cateriaid">
            <option [value]="null">-- Nenhuma --</option>
            <option *ngFor="let c of categorias" [value]="c.cateriaid">{{c.nome}}</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Autor</label>
          <input class="form-control" [(ngModel)]="selecionado.autor">
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label">Texto</label>
        <div id="quill-editor" style="min-height: 220px; background: white;"></div>
      </div>
      <button class="btn btn-success btn-sm me-2" (click)="salvar()">Salvar</button>
      <button class="btn btn-secondary btn-sm" (click)="cancelar()">Cancelar</button>
    </div>
  </div>

  <table class="table table-striped table-hover" *ngIf="!modoEdicao">
    <thead class="table-dark">
      <tr><th>Título</th><th>Autor</th><th>Área</th><th>Data</th><th></th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of lista">
        <td>{{item.titulo}}</td>
        <td>{{item.autor}}</td>
        <td>{{item.areaid}}</td>
        <td>{{item.datainclusao | date:'dd/MM/yyyy'}}</td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="editar(item)">Editar</button>
          <button class="btn btn-outline-danger btn-sm" (click)="excluir(item.conteudoid)">Excluir</button>
        </td>
      </tr>
      <tr *ngIf="lista.length === 0">
        <td colspan="5" class="text-center text-muted">Nenhum conteúdo cadastrado.</td>
      </tr>
    </tbody>
  </table>
</div>
