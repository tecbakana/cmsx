<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Categorias</h4>
    <button class="btn btn-primary btn-sm" (click)="novo()" *ngIf="!modoEdicao">+ Nova Categoria</button>
  </div>

  <div *ngIf="modoEdicao" class="card mb-3">
    <div class="card-body">
      <h5>{{ selecionado?.cateriaid ? 'Editar' : 'Nova' }} Categoria</h5>
      <div class="row g-2">
        <div class="col-md-4">
          <label class="form-label">Nome</label>
          <input class="form-control" [(ngModel)]="selecionado.nome">
        </div>
        <div class="col-md-4">
          <label class="form-label">Categoria Pai</label>
          <select class="form-select" [(ngModel)]="selecionado.cateriaidpai">
            <option [value]="null">— Nenhuma (raiz) —</option>
            <option *ngFor="let c of opcoesPai()" [value]="c.cateriaid">{{c.nome}}</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Tipo</label>
          <input type="number" class="form-control" [(ngModel)]="selecionado.tipocateria">
        </div>
        <div class="col-md-6">
          <label class="form-label">Descrição</label>
          <input class="form-control" [(ngModel)]="selecionado.descricao">
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-success btn-sm me-2" (click)="salvar()">Salvar</button>
        <button class="btn btn-secondary btn-sm" (click)="cancelar()">Cancelar</button>
      </div>
    </div>
  </div>

  <table class="table table-striped table-hover" *ngIf="!modoEdicao">
    <thead class="table-dark">
      <tr><th>Nome</th><th>Categoria Pai</th><th>Descrição</th><th>Tipo</th><th></th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of lista">
        <td>
          <span *ngIf="item.cateriaidpai" class="text-muted me-1">↳</span>
          {{item.nome}}
        </td>
        <td><small class="text-muted">{{nomePai(item.cateriaidpai)}}</small></td>
        <td>{{item.descricao}}</td>
        <td>{{item.tipocateria}}</td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="editar(item)">Editar</button>
          <button class="btn btn-outline-danger btn-sm" (click)="excluir(item.cateriaid)">Excluir</button>
        </td>
      </tr>
      <tr *ngIf="lista.length === 0">
        <td colspan="5" class="text-center text-muted">Nenhuma categoria cadastrada.</td>
      </tr>
    </tbody>
  </table>
</div>
