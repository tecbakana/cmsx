<div class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3 mb-3">
    <h4 class="mb-0">Carrinho</h4>
    <button class="btn btn-sm btn-link text-muted ms-auto" (click)="continuarComprando()">
      ← Continuar comprando
    </button>
  </div>

  <div *ngIf="itens.length === 0" class="text-center text-muted py-5 fst-italic">
    Carrinho vazio.
    <br>
    <button class="btn btn-sm btn-primary mt-3" (click)="continuarComprando()">Ver catálogo</button>
  </div>

  <div *ngIf="itens.length > 0">
    <div class="table-responsive">
      <table class="table table-hover table-sm align-middle">
        <thead class="table-dark">
          <tr>
            <th>Produto</th>
            <th>SKU</th>
            <th class="text-end">Valor unit.</th>
            <th class="text-center" style="width:130px">Qtd</th>
            <th class="text-end">Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of itens">
            <td>{{item.nome}}</td>
            <td class="text-muted small">{{item.sku}}</td>
            <td class="text-end">{{formatarValor(item.valor)}}</td>
            <td class="text-center">
              <div class="d-flex align-items-center justify-content-center gap-1">
                <button class="btn btn-outline-secondary btn-sm px-2"
                        (click)="alterarQuantidade(item.produtoid, item.quantidade - 1)">−</button>
                <span style="min-width:24px;text-align:center">{{item.quantidade}}</span>
                <button class="btn btn-outline-secondary btn-sm px-2"
                        (click)="alterarQuantidade(item.produtoid, item.quantidade + 1)">+</button>
              </div>
            </td>
            <td class="text-end fw-semibold">{{formatarValor(item.valor * item.quantidade)}}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-danger" (click)="remover(item.produtoid)">×</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
      <button class="btn btn-sm btn-outline-secondary" (click)="limpar()">Limpar carrinho</button>
      <div class="text-end">
        <div class="fs-5 fw-bold">Total: {{formatarValor(total())}}</div>
        <button class="btn btn-success mt-2" (click)="finalizarCompra()">Finalizar Compra →</button>
      </div>
    </div>
  </div>
</div>
