<div class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3 mb-3">
    <h4 class="mb-0">Catálogo</h4>

    <input class="form-control form-control-sm" style="max-width:240px"
           placeholder="Buscar produto ou SKU..."
           [(ngModel)]="busca">

    <button class="btn btn-sm btn-outline-primary ms-auto position-relative" (click)="irParaCarrinho()">
      Carrinho
      <span *ngIf="totalItensCarrinho() > 0"
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
        {{totalItensCarrinho()}}
      </span>
    </button>
  </div>

  <div *ngIf="carregando" class="text-muted">Carregando produtos...</div>

  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3" *ngIf="!carregando">
    <div class="col" *ngFor="let p of produtosFiltrados">
      <div class="card h-100 shadow-sm">
        <div class="card-body d-flex flex-column">
          <h6 class="card-title">{{p.nome}}</h6>
          <p class="card-text text-muted small flex-grow-1">{{p.descricacurta || '—'}}</p>
          <div class="d-flex align-items-center justify-content-between mt-2">
            <span class="fw-semibold text-success">{{formatarValor(p.valor)}}</span>
            <span class="text-muted" style="font-size:.75rem">SKU: {{p.sku}}</span>
          </div>
        </div>
        <div class="card-footer bg-transparent border-top-0">
          <button class="btn btn-sm btn-primary w-100" (click)="adicionarAoCarrinho(p)">
            + Adicionar ao Carrinho
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="produtosFiltrados.length === 0" class="col-12">
      <p class="text-muted fst-italic text-center py-4">Nenhum produto encontrado.</p>
    </div>
  </div>
</div>
