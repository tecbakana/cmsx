<div class="container-fluid py-3" style="max-width:480px">
  <h4 class="mb-3">Perfil</h4>
  <div class="card" *ngIf="auth$ | async as auth">
    <div class="card-body">
      <div class="mb-3">
        <div class="text-muted small">Nome</div>
        <div class="fw-semibold">{{ auth.nome }}</div>
      </div>
      <div>
        <div class="text-muted small">E-mail</div>
        <div>{{ auth.email }}</div>
      </div>
    </div>
  </div>
</div>
