<div class="container-fluid py-3" style="max-width:480px">
  <h4 class="mb-3">Novo Cliente</h4>

  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="nome">Nome <span class="text-danger">*</span></label>
        <input class="form-control form-control-sm" [(ngModel)]="form.nome" placeholder="Nome completo">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="documento">Documento</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.documento" placeholder="CPF ou CNPJ">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="email">E-mail <span class="text-danger">*</span></label>
        <input class="form-control form-control-sm" type="email" [(ngModel)]="form.email" placeholder="email@exemplo.com">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="telefone">Telefone</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.telefone" placeholder="(00) 00000-0000">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="cep">CEP</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.cep" (ngModelChange)="cepSubject.next($event)"  name="logradouro"  placeholder="00000-000">
      </div>
      
      <div class="mb-3">
        <label class="form-label small fw-semibold" for="logradouro">Logradouro</label>
        <input id="logradouro" class="form-control form-control-sm" [(ngModel)]="form.logradouro">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="numero">Numero</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.numero" id="numero">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="complemento">Complemento</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.complemento" id="complemento">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="bairro">Bairro</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.bairro" id="bairro">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="cidade">Cidade</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.cidade" id="cidade">
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold" for="estado">Estado</label>
        <input class="form-control form-control-sm" [(ngModel)]="form.estado" id="estado">
      </div>

      <div *ngIf="erro" class="alert alert-danger py-2 small">{{erro}}</div>

      <div class="d-flex justify-content-end gap-2 mt-3">
        <button class="btn btn-sm btn-outline-secondary" (click)="cancelar()">Cancelar</button>
        <button class="btn btn-sm btn-primary" [disabled]="!podeSalvar()" (click)="salvar()">
          <span *ngIf="enviando">Salvando...</span>
          <span *ngIf="!enviando">Salvar Cliente</span>
        </button>
      </div>
    </div>
  </div>
</div>
