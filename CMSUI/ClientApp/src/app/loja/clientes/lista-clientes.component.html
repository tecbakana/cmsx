<div class="container-fluid py-3">
  <div class="d-flex align-items-center gap-3 mb-3">
    <h4 class="mb-0">Clientes</h4>

    <input class="form-control form-control-sm" style="max-width:240px"
           placeholder="Buscar por nome, e-mail ou documento..."
           [(ngModel)]="busca">

    <button class="btn btn-sm btn-primary ms-auto" (click)="novoCliente()">+ Novo Cliente</button>
  </div>

  <div *ngIf="carregando" class="text-muted">Carregando clientes...</div>

  <div class="table-responsive" *ngIf="!carregando">
    <table class="table table-hover table-sm align-middle">
      <thead class="table-dark">
        <tr>
          <th>Nome</th>
          <th>Documento</th>
          <th>E-mail</th>
          <th>Telefone</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of clientesFiltrados">
          <td class="fw-semibold">{{c.nome}}</td>
          <td class="text-muted small">{{c.documento || '—'}}</td>
          <td class="text-muted small">{{c.email}}</td>
          <td class="text-muted small">{{c.telefone || '—'}}</td>
          <td class="text-end">
            <button class="btn btn-sm btn-outline-primary" (click)="selecionarParaCheckout(c)">
              Selecionar
            </button>
          </td>
        </tr>

        <tr *ngIf="clientesFiltrados.length === 0">
          <td colspan="5" class="text-center text-muted py-4 fst-italic">
            Nenhum cliente encontrado.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
