<div class="container-fluid py-4" style="max-width:480px">

  <div class="card">

    <!-- Abas -->
    <div class="card-header d-flex gap-2 p-2">
      <button type="button" class="btn btn-sm flex-fill"
              [class.btn-primary]="modo === 'login'"
              [class.btn-outline-secondary]="modo !== 'login'"
              (click)="modo = 'login'; erro = ''">
        Entrar
      </button>
      <button type="button" class="btn btn-sm flex-fill"
              [class.btn-primary]="modo === 'cadastro'"
              [class.btn-outline-secondary]="modo !== 'cadastro'"
              (click)="modo = 'cadastro'; erro = ''">
        Criar conta
      </button>
    </div>

    <div class="card-body">

      <div *ngIf="erro" class="alert alert-danger py-2 small">{{ erro }}</div>

      <!-- LOGIN -->
      <form *ngIf="modo === 'login'" (ngSubmit)="entrar()" #fLogin="ngForm">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input class="form-control" type="email" [(ngModel)]="login.email" name="email" required autocomplete="email" />
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input class="form-control" type="password" [(ngModel)]="login.senha" name="senha" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary w-100" [disabled]="carregando || !fLogin.valid">
          {{ carregando ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <!-- CADASTRO -->
      <form *ngIf="modo === 'cadastro'" (ngSubmit)="registrar()" #fCadastro="ngForm">
        <div class="mb-3">
          <label class="form-label">Nome completo</label>
          <input class="form-control" type="text" [(ngModel)]="cadastro.nome" name="nome" required />
        </div>
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input class="form-control" type="email" [(ngModel)]="cadastro.email" name="email" required autocomplete="email" />
        </div>
        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input class="form-control" type="password" [(ngModel)]="cadastro.senha" name="senha" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="row g-2 mb-3">
          <div class="col">
            <label class="form-label">CPF / CNPJ</label>
            <input class="form-control" type="text" [(ngModel)]="cadastro.documento" name="documento" required />
          </div>
          <div class="col">
            <label class="form-label">Telefone</label>
            <input class="form-control" type="text" [(ngModel)]="cadastro.telefone" name="telefone" required />
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-header fw-semibold small">Endereço</div>
          <div class="card-body pb-2">
            <div class="row g-2 mb-3">
              <div class="col-5">
                <label class="form-label">CEP</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.cep" name="cep" required (blur)="buscarCep()" maxlength="9" />
                <small *ngIf="buscandoCep" class="text-muted">buscando...</small>
              </div>
              <div class="col-3">
                <label class="form-label">UF</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.estado" name="estado" required maxlength="2" />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Logradouro</label>
              <input class="form-control" type="text" [(ngModel)]="cadastro.logradouro" name="logradouro" required />
            </div>
            <div class="row g-2 mb-3">
              <div class="col-4">
                <label class="form-label">Número</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.numero" name="numero" required />
              </div>
              <div class="col">
                <label class="form-label">Complemento</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.complemento" name="complemento" />
              </div>
            </div>
            <div class="row g-2">
              <div class="col">
                <label class="form-label">Bairro</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.bairro" name="bairro" required />
              </div>
              <div class="col">
                <label class="form-label">Cidade</label>
                <input class="form-control" type="text" [(ngModel)]="cadastro.cidade" name="cidade" required />
              </div>
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="carregando || !fCadastro.valid">
          {{ carregando ? 'Criando conta...' : 'Criar conta' }}
        </button>
      </form>

    </div>
  </div>

</div>
