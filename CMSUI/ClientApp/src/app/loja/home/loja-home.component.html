<div class="container py-5">

  <div class="text-center mb-5">
    <h2 class="fw-bold">{{ ctx.nomeLoja }}</h2>
    <p class="text-muted">Bem-vindo! Escolha uma opção para começar.</p>
  </div>

  <div class="row justify-content-center g-4">

    <!-- Catálogo -->
    <div class="col-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm text-center loja-home-card" (click)="ir('catalogo')" role="button">
        <div class="card-body d-flex flex-column align-items-center justify-content-center py-4">
          <div class="loja-home-icon mb-3">&#128722;</div>
          <h6 class="card-title mb-1">Produtos</h6>
          <p class="card-text text-muted small">Veja nosso catálogo</p>
        </div>
      </div>
    </div>

    <!-- Carrinho -->
    <div class="col-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm text-center loja-home-card position-relative" (click)="ir('carrinho')" role="button">
        <span *ngIf="totalCarrinho > 0"
              class="position-absolute top-0 end-0 translate-middle badge rounded-pill bg-danger mt-2 me-2">
          {{ totalCarrinho }}
        </span>
        <div class="card-body d-flex flex-column align-items-center justify-content-center py-4">
          <div class="loja-home-icon mb-3">&#128717;</div>
          <h6 class="card-title mb-1">Carrinho</h6>
          <p class="card-text text-muted small">{{ totalCarrinho > 0 ? totalCarrinho + ' item(s)' : 'Vazio' }}</p>
        </div>
      </div>
    </div>

    <!-- Histórico de Pedidos -->
    <div class="col-6 col-md-4 col-lg-3">
      <div class="card h-100 shadow-sm text-center loja-home-card" (click)="ir('historico')" role="button">
        <div class="card-body d-flex flex-column align-items-center justify-content-center py-4">
          <div class="loja-home-icon mb-3">&#128203;</div>
          <h6 class="card-title mb-1">Meus Pedidos</h6>
          <p class="card-text text-muted small">Histórico de compras</p>
        </div>
      </div>
    </div>

  </div>

</div>

<style>
  .loja-home-card {
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .loja-home-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 .5rem 1rem rgba(0,0,0,.15) !important;
  }
  .loja-home-icon {
    font-size: 2.5rem;
    line-height: 1;
  }
</style>
