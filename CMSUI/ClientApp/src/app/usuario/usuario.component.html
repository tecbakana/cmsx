<div class="container-fluid py-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Usuários</h4>
    <button class="btn btn-primary btn-sm" (click)="novo()" *ngIf="!modoEdicao">+ Novo Usuário</button>
  </div>

  <div *ngIf="modoEdicao" class="card mb-3">
    <div class="card-body">
      <h5>{{ selecionado?.userid ? 'Editar' : 'Novo' }} Usuário</h5>
      <div class="row g-2">
        <div class="col-md-3">
          <label class="form-label">Nome</label>
          <input class="form-control" [(ngModel)]="selecionado.nome">
        </div>
        <div class="col-md-3">
          <label class="form-label">Sobrenome</label>
          <input class="form-control" [(ngModel)]="selecionado.sobrenome">
        </div>
        <div class="col-md-2">
          <label class="form-label">Login (apelido)</label>
          <input class="form-control" [(ngModel)]="selecionado.apelido" maxlength="6">
        </div>
        <div class="col-md-2">
          <label class="form-label">{{ selecionado?.userid ? 'Nova Senha (opcional)' : 'Senha' }}</label>
          <input type="password" class="form-control" [(ngModel)]="selecionado.senha">
        </div>
        <div class="col-md-2">
          <label class="form-label">Ativo</label>
          <select class="form-select" [(ngModel)]="selecionado.ativo">
            <option [value]="1">Sim</option>
            <option [value]="0">Não</option>
          </select>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-success btn-sm me-2" (click)="salvar()">Salvar</button>
        <button class="btn btn-secondary btn-sm" (click)="cancelar()">Cancelar</button>
      </div>
    </div>
  </div>

  <table class="table table-striped table-hover" *ngIf="!modoEdicao">
    <thead class="table-dark">
      <tr>
        <th>Nome</th>
        <th>Sobrenome</th>
        <th>Login</th>
        <th>Ativo</th>
        <th>Data Inclusão</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let u of lista">
        <td>{{u.nome}}</td>
        <td>{{u.sobrenome}}</td>
        <td>{{u.apelido}}</td>
        <td><span class="badge" [class.bg-success]="u.ativo===1" [class.bg-danger]="u.ativo!==1">
          {{u.ativo===1?'Ativo':'Inativo'}}</span></td>
        <td>{{u.datainclusao | date:'dd/MM/yyyy'}}</td>
        <td>
          <button class="btn btn-outline-primary btn-sm me-1" (click)="editar(u)">Editar</button>
          <button class="btn btn-outline-danger btn-sm" (click)="excluir(u.userid)">Excluir</button>
        </td>
      </tr>
      <tr *ngIf="lista.length === 0">
        <td colspan="6" class="text-center text-muted">Nenhum usuário cadastrado.</td>
      </tr>
    </tbody>
  </table>
</div>
