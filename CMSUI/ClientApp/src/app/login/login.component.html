<div class="login-shell">
  <div class="login-card">

    <img src="/assets/logo.png" alt="Multiplai" class="login-logo"
      onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">
    <div class="login-logo-placeholder" style="display:none">M</div>

    <div class="login-title">Multiplai</div>
    <div class="login-sub">Faça login para continuar</div>

    <div *ngIf="erro" class="alert alert-danger mb-3">{{erro}}</div>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Login</label>
        <input type="text" class="form-control" [(ngModel)]="apelido" name="apelido" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" class="form-control" [(ngModel)]="senha" name="senha" required>
      </div>
      <button type="submit" class="btn btn-primary w-100" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="login-divider">ou</div>

    <button type="button" class="btn btn-outline-secondary w-100" (click)="loginDemo()" [disabled]="carregando">
      Experimentar demo
    </button>

    <p class="text-center mt-4 mb-0" style="font-size:13px;color:var(--muted)">
      Não tem conta? <a routerLink="/signup">Criar conta</a>
    </p>
  </div>
</div>
