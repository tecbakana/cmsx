apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmsui
  namespace: multiplai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmsui
  template:
    metadata:
      labels:
        app: cmsui
    spec:
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: cmsui
          image: gru.ocir.io/grvzruvkeyil/multiplai/cmsui:latest
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cmsui
  namespace: multiplai
spec:
  selector:
    app: cmsui
  ports:
    - port: 8080
      targetPort: 8080
