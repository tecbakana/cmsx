# NÃO commitar com valores reais. Criar via kubectl apply após preencher.
# Ou use: kubectl create secret generic multiplai-secrets -n multiplai --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: multiplai-secrets
  namespace: multiplai
type: Opaque
stringData:
  POSTGRES_CMSAPI: "Host=<OCI_PG_HOST>;Port=5432;Database=cmsxdb;Username=cmsxadmin;Password=<SENHA>"
  POSTGRES_PUBLICA: "Host=<OCI_PG_HOST>;Port=5432;Database=cmsxdb;Username=cmsxadmin;Password=<SENHA>"
  JWT_KEY_CMSAPI: "<JWT_KEY_MINIMO_32_CHARS>"
  SALEMATIC_JWT_KEY: "<MESMA_KEY_CONFIGURADA_NO_SALEMATIC>"
